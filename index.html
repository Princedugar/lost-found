<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Unknown Registry - Lost & Found</title>

<style>

/* BODY */
body{
    font-family: Arial;
    margin:0;
    background: linear-gradient(135deg,#2299ee,#bbdefb,#eae1fe);
}

/* HEADER */
header{
    background:#1e3a8a;
    color:white;
    text-align:center;
    padding:15px;
}

/* NAV */
nav{
    background:#111827;
    text-align:center;
}
nav button{
    background:none;
    border:none;
    color:white;
    padding:15px 20px;
    cursor:pointer;
}
nav button:hover{
    background:#2563eb;
}

/* CONTAINER */
.container{
    display:none;
    padding:30px;
}
.active{
    display:block;
}

/* CARD */
.card{
    background:white;
    max-width:500px;
    margin:auto;
    padding:20px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
}

/* INPUT */
input,textarea{
    width:100%;
    padding:10px;
    margin-top:10px;
    border-radius:5px;
    border:1px solid #ccc;
}

/* BUTTON */
button.submit{
    background:#2563eb;
    color:white;
    border:none;
    padding:10px;
    width:100%;
    margin-top:15px;
    border-radius:5px;
    cursor:pointer;
}

/* ITEMS */
.items{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
}

.item{
    background:#eee;
    padding:15px;
    margin:10px;
    border-radius:10px;
    width:300px;
    text-align:center;
}

.item img{
    width:100%;
    height:200px;
    object-fit:cover;
    border-radius:8px;
}

/* DELETE */
.deleteBtn{
    background:red;
    color:white;
    border:none;
    padding:8px;
    margin-top:10px;
    cursor:pointer;
}

/* HERO */
.hero{
    text-align:center;
    padding:40px;
    background:linear-gradient(135deg,#2563eb,#1e3a8a);
    color:white;
    border-radius:10px;
}

/* FEATURES */
.features{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:20px;
    margin-top:20px;
}

.feature{
    background:white;
    padding:15px;
    width:250px;
    border-radius:10px;
}

/* ✅ MEDIA QUERY */
@media (max-width:600px){

    nav button{
        display:block;
        width:100%;
        padding:10px;
    }

    .container{
        padding:10px;
    }

    .card{
        width:100%;
    }

    .item{
        width:100%;
    }

    .features{
        flex-direction:column;
        align-items:center;
    }
}

</style>
</head>

<body>

<header>
<h1>Unknown Registry</h1>
<p>College Lost & Found Portal</p>
</header>

<nav>
<button onclick="showPage('home')">Home</button>
<button onclick="showPage('lost')">Lost</button>
<button onclick="showPage('found')">Found</button>
<button onclick="showPage('items')">View</button>
<button onclick="showPage('about')">About</button>
</nav>

<!-- HOME -->
<div id="home" class="container active">
<div class="hero">
<h1>Lost & Found Portal</h1>
<p>Find or report items easily</p>
</div>
</div>

<!-- LOST -->
<div id="lost" class="container">
<div class="card">
<h2>Lost Item</h2>
<input id="lostName" placeholder="Name">
<input id="lostItem" placeholder="Item">
<input id="lostContact" placeholder="Contact">
<input type="file" id="lostImage">
<button class="submit" onclick="saveLost()">Submit</button>
</div>
</div>

<!-- FOUND -->
<div id="found" class="container">
<div class="card">
<h2>Found Item</h2>
<input id="foundName" placeholder="Name">
<input id="foundItem" placeholder="Item">
<input id="foundContact" placeholder="Contact">
<input type="file" id="foundImage">
<button class="submit" onclick="saveFound()">Submit</button>
</div>
</div>

<!-- ITEMS -->
<div id="items" class="container">
<h2 style="text-align:center;">Items</h2>
<div id="itemsList" class="items"></div>
</div>

<!-- ABOUT -->
<div id="about" class="container">
<div class="card">
<h2>About</h2>
<p>Lost & Found system for college.</p>
</div>
</div>

<script>

function showPage(page){
document.querySelectorAll('.container').forEach(c=>c.classList.remove("active"));
document.getElementById(page).classList.add("active");
if(page==="items") displayItems();
}

function saveLost(){
let file=lostImage.files[0];
let reader=new FileReader();

reader.onload=function(){
let data={
type:"Lost",
name:lostName.value,
item:lostItem.value,
contact:lostContact.value,
image:reader.result
};
saveData(data);
alert("Saved");
};

if(file){reader.readAsDataURL(file)} else {reader.onload()}
}

function saveFound(){
let file=foundImage.files[0];
let reader=new FileReader();

reader.onload=function(){
let data={
type:"Found",
name:foundName.value,
item:foundItem.value,
contact:foundContact.value,
image:reader.result
};
saveData(data);
alert("Saved");
};

if(file){reader.readAsDataURL(file)} else {reader.onload()}
}

function saveData(data){
let items=JSON.parse(localStorage.getItem("items"))||[];
items.push(data);
localStorage.setItem("items",JSON.stringify(items));
}

function displayItems(){
let items=JSON.parse(localStorage.getItem("items"))||[];
let html="";

items.forEach(i=>{
html+=`
<div class="item">
<b>${i.type}</b>
<img src="${i.image}">
<p>${i.name}</p>
<p>${i.item}</p>
<p>${i.contact}</p>
</div>`;
});

itemsList.innerHTML=html;
}

</script>

</body>
</html>
